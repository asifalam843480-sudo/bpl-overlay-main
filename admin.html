<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPL Scorer Panel | Titanium V11</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
body { background: #050b14; font-family: 'Montserrat', sans-serif; color: #fff; padding: 20px; margin: 0; }
.container { max-width: 1200px; margin: auto; }
.card { background: linear-gradient(145deg, #0a122c, #060b19); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255, 215, 0, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
h2 { margin-top: 0; color: #ffd700; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 10px; }
label { font-size: 12px; color: #8892b0; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
input { width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 15px; background: #02060d; color: #fff; border: 1px solid #1e293b; border-radius: 8px; font-weight: bold; transition: 0.3s; box-sizing: border-box; }
input:focus { outline: none; border-color: #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.2); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
button { padding: 12px; margin: 5px; font-size: 16px; font-weight: 900; cursor: pointer; border: none; border-radius: 8px; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
button:active { transform: translateY(2px); box-shadow: none; }
.runBtn { width: 70px; height: 60px; font-size: 24px; border-radius: 12px; }
.green { background: linear-gradient(135deg, #00b09b, #96c93d); color: #000; }
.red { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: #fff; }
.blue { background: linear-gradient(135deg, #36d1dc, #5b86e5); color: #fff; }
.gold { background: linear-gradient(135deg, #f12711, #f5af19); color: #fff; }
.scoreBox { font-size: 55px; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,215,0,0.4); }
.badge { background: #1e293b; color: #8892b0; padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; border: none; }
.badge.active { background: #ffd700; color: #000; box-shadow: 0 0 15px rgba(255,215,0,0.6); }
.over-log { display: inline-block; padding: 5px 10px; background: #111; margin: 2px; border-radius: 5px; font-weight: bold; border: 1px solid #333; }
</style>
</head>
<body>
<div class="container">

<div class="card">
<h2>1. Live Match Engine</h2>
<div class="grid">
    <div>
        <label>Team A Name</label><input id="teamA">
        <label style="color:#00b85c;">Team A Logo (Bug-Free Upload)</label><input type="file" id="teamALogo" accept="image/*">
    </div>
    <div>
        <label>Team B Name</label><input id="teamB">
        <label style="color:#00b85c;">Team B Logo (Bug-Free Upload)</label><input type="file" id="teamBLogo" accept="image/*">
    </div>
</div>
<div class="grid">
    <div>
        <label>Batsman 1 <button id="btnStrike1" class="badge active" onclick="setStrike(1)">ON STRIKE (▶)</button></label>
        <input id="b1Name">
        <div style="display:flex; gap:10px;"><input id="b1Runs" type="number" placeholder="Runs"><input id="b1Balls" type="number" placeholder="Balls"></div>
    </div>
    <div>
        <label>Batsman 2 <button id="btnStrike2" class="badge" onclick="setStrike(2)">SET STRIKE</button></label>
        <input id="b2Name">
        <div style="display:flex; gap:10px;"><input id="b2Runs" type="number" placeholder="Runs"><input id="b2Balls" type="number" placeholder="Balls"></div>
    </div>
</div>
<div class="grid">
    <div>
        <label>Bowler Name</label><input id="bowler">
        <div style="display:flex; gap:10px;"><input id="bowlerWickets" type="number" placeholder="Wickets"><input id="bowlerRuns" type="number" placeholder="Runs"></div>
    </div>
    <div><label>Target (2nd Innings)</label><input id="target" type="number"></div>
</div>
</div>

<div class="card" style="text-align: center;">
<div class="scoreBox" id="score">0/0</div>
<div id="overs" style="font-size:26px; color:#8892b0; font-weight:bold;">0.0 Overs</div>
<div id="thisOver" style="margin-top:15px; min-height: 40px;"></div>
</div>

<div class="card" style="text-align: center;">
<h2>3. Action Room</h2>
<button class="runBtn green" onclick="addRun(0)">0</button>
<button class="runBtn green" onclick="addRun(1)">1</button>
<button class="runBtn green" onclick="addRun(2)">2</button>
<button class="runBtn green" onclick="addRun(3)">3</button>
<button class="runBtn gold" style="font-size: 30px;" onclick="addRun(4)">4</button>
<button class="runBtn gold" style="font-size: 30px;" onclick="addRun(6)">6</button>
<button class="runBtn red" onclick="addWicket('W')">OUT</button>
<button class="runBtn red" style="font-size: 16px; background: #8b0000;" onclick="addRunOut()">RUN<br>OUT</button>
<br><br>
<button class="blue" onclick="extraBall('WD')">WIDE</button>
<button class="blue" onclick="extraBall('NB')">NO BALL</button>
<button class="blue" style="background:#8e44ad;" onclick="addLegBye(4)">4 LEG BYE</button>
<button class="blue" onclick="addBye(5, '5B')">5 BYE (WD+4)</button>
<button class="gold" onclick="undoBall()">UNDO LAST BALL</button>
</div>

<div class="card" style="text-align: center;">
<h2>🏆 Match Winner Board</h2>
<input id="winnerText" placeholder="Jaise: RCB WON BY 5 WICKETS">
<button class="green" onclick="toggleFlag('showWinner', true)">Show Winner Banner</button>
<button class="red" onclick="toggleFlag('showWinner', false)">Hide Banner</button>
</div>

<div class="card" style="display:flex; justify-content:space-between;">
<button class="green" style="width:48%; background:#007bff;" onclick="startSecondInnings()">🔄 AUTO-SWAP & 2ND INNINGS</button>
<button class="red" style="width:48%; background:darkred;" onclick="hardReset()">RESET FULL MATCH</button>
</div>

</div>

<script>
// EXTREMELY NEW DB KEY TO KILL OLD BUGS
const DB_KEY = "BPL_FINAL_BEAST_V11"; 
let defaultData = { teamA: "TEAM A", teamB: "TEAM B", teamALogo: "", teamBLogo: "", score: 0, wickets: 0, balls: 0, target: 0, innings: 1, thisOver: [], history: [], b1Name: "BAT 1", b1Runs: 0, b1Balls: 0, b2Name: "BAT 2", b2Runs: 0, b2Balls: 0, onStrike: 1, bowler: "BOWLER", bowlerRuns: 0, bowlerWickets: 0, flashEvent: "", flashId: 0, winnerText: "", showWinner: false };
let matchData;
try { let saved = localStorage.getItem(DB_KEY); matchData = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultData)); } catch(e) { matchData = JSON.parse(JSON.stringify(defaultData)); }

function saveData() { localStorage.setItem(DB_KEY, JSON.stringify(matchData)); }
function getOvers() { return Math.floor(matchData.balls / 6) + "." + (matchData.balls % 6); }
function saveHistory() { let snap = JSON.parse(JSON.stringify(matchData)); delete snap.history; matchData.history.push(snap); if(matchData.history.length > 30) matchData.history.shift(); }
function rotateStrike() { matchData.onStrike = matchData.onStrike === 1 ? 2 : 1; }
function triggerAnimation(type) { matchData.flashEvent = type; matchData.flashId = Date.now(); }

// FLAWLESS 7TH BALL LOGIC (Bowler stats stay until NEXT over starts)
function checkAndClearOver() {
    let legal = matchData.thisOver.filter(b => b !== "WD" && b !== "NB").length;
    if (legal >= 6) { matchData.thisOver = []; }
}

function checkHatTrick() {
    let over = matchData.thisOver;
    if (over.length >= 3) {
        let last3 = over.slice(-3);
        if (last3.every(b => b === "W" || b === "RO")) triggerAnimation("HATRICK_W");
        if (last3.every(b => b === 4 || b === "4")) triggerAnimation("HATRICK_4");
    }
}

function addRun(run) {
    saveHistory(); checkAndClearOver(); run = parseInt(run);
    matchData.score += run; matchData.bowlerRuns += run; matchData.balls++; matchData.thisOver.push(run);
    if(matchData.onStrike === 1) { matchData.b1Runs += run; matchData.b1Balls++; } else { matchData.b2Runs += run; matchData.b2Balls++; }
    if(run === 4 || run === 6) triggerAnimation(run);
    if(run % 2 !== 0) rotateStrike();
    if(matchData.balls > 0 && matchData.balls % 6 === 0) rotateStrike();
    checkHatTrick(); updateUI();
}

function addWicket(type) {
    saveHistory(); checkAndClearOver();
    matchData.wickets++; matchData.bowlerWickets++; matchData.balls++; matchData.thisOver.push("W");
    if(matchData.onStrike === 1) matchData.b1Balls++; else matchData.b2Balls++;
    triggerAnimation("W");
    if(matchData.balls > 0 && matchData.balls % 6 === 0) rotateStrike();
    checkHatTrick(); updateUI();
}

// RUN OUT (No Bowler Wicket)
function addRunOut() {
    saveHistory(); checkAndClearOver();
    matchData.wickets++; matchData.balls++; matchData.thisOver.push("RO");
    if(matchData.onStrike === 1) matchData.b1Balls++; else matchData.b2Balls++;
    triggerAnimation("RO");
    if(matchData.balls > 0 && matchData.balls % 6 === 0) rotateStrike();
    checkHatTrick(); updateUI();
}

// LEG BYE (Runs to Team, NOT to Bowler or Batsman)
function addLegBye(runs) {
    saveHistory(); checkAndClearOver(); runs = parseInt(runs);
    matchData.score += runs; matchData.balls++; matchData.thisOver.push(runs + "LB");
    if(matchData.onStrike === 1) matchData.b1Balls++; else matchData.b2Balls++;
    triggerAnimation(4); 
    if(runs % 2 !== 0) rotateStrike();
    if(matchData.balls > 0 && matchData.balls % 6 === 0) rotateStrike();
    updateUI();
}

function extraBall(type) { saveHistory(); checkAndClearOver(); matchData.score++; matchData.bowlerRuns++; matchData.thisOver.push(type); updateUI(); }
function addBye(runs, type) { saveHistory(); checkAndClearOver(); matchData.score += runs; matchData.balls++; matchData.thisOver.push(type); if(matchData.onStrike === 1) matchData.b1Balls++; else matchData.b2Balls++; if(matchData.balls > 0 && matchData.balls % 6 === 0) rotateStrike(); updateUI(); }

function undoBall() { if(matchData.history.length === 0) return; let hist = matchData.history; let oldA = matchData.teamALogo, oldB = matchData.teamBLogo; matchData = hist.pop(); matchData.teamALogo = oldA; matchData.teamBLogo = oldB; matchData.history = hist; updateUI(); }

function startSecondInnings() { 
    if(!confirm("Start 2nd Innings? Teams and scores will swap!")) return;
    saveHistory();
    let tA = matchData.teamA, tB = matchData.teamB, lA = matchData.teamALogo, lB = matchData.teamBLogo;
    matchData.teamA = tB; matchData.teamB = tA; matchData.teamALogo = lB; matchData.teamBLogo = lA;
    matchData.target = matchData.score + 1; matchData.score = 0; matchData.wickets = 0; matchData.balls = 0; 
    matchData.b1Runs = 0; matchData.b1Balls = 0; matchData.b2Runs = 0; matchData.b2Balls = 0; 
    matchData.bowlerRuns = 0; matchData.bowlerWickets = 0; matchData.innings = 2; 
    matchData.thisOver = []; matchData.showWinner = false; updateUI(); 
}

function setStrike(n) { matchData.onStrike = n; updateUI(); }
function toggleFlag(flag, state) { matchData[flag] = state; updateUI(); }
function hardReset() { if(confirm("Sab clear ho jayega. Pakka?")) { localStorage.clear(); location.reload(); } }

function updateUI() {
    document.getElementById("score").innerText = matchData.score + "/" + matchData.wickets;
    document.getElementById("overs").innerText = getOvers() + " Overs";
    let html = ""; matchData.thisOver.forEach(b => html += `<span class="over-log">${b}</span>`);
    document.getElementById("thisOver").innerHTML = html;
    
    ["teamA", "teamB", "b1Name", "b1Runs", "b1Balls", "b2Name", "b2Runs", "b2Balls", "bowler", "bowlerRuns", "bowlerWickets", "target", "winnerText"].forEach(id => { 
        let el = document.getElementById(id); 
        if(el && document.activeElement !== el) el.value = matchData[id] || ""; 
    });
    
    document.getElementById("btnStrike1").className = matchData.onStrike===1 ? "badge active" : "badge";
    document.getElementById("btnStrike2").className = matchData.onStrike===2 ? "badge active" : "badge";
    saveData();
}

document.addEventListener("DOMContentLoaded", () => {
    updateUI();
    ["teamA", "teamB", "b1Name", "b1Runs", "b1Balls", "b2Name", "b2Runs", "b2Balls", "bowler", "bowlerRuns", "bowlerWickets", "target", "winnerText"].forEach(id => {
        document.getElementById(id).addEventListener("input", e => { matchData[id] = e.target.type === 'number' ? (parseInt(e.target.value)||0) : e.target.value; saveData(); });
    });
    
    // HEAVY COMPRESSION TO AVOID STORAGE CRASH
    const handleImage = (id, key) => {
        let el = document.getElementById(id); if(!el) return;
        el.addEventListener("change", e => {
            const file = e.target.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = ev => { const img = new Image(); img.onload = () => { 
                const canvas = document.createElement("canvas"); let scale = 100 / img.width; if(scale > 1) scale = 1;
                canvas.width = img.width * scale; canvas.height = img.height * scale; canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height); 
                matchData[key] = canvas.toDataURL("image/webp", 0.6); saveData(); 
            }; img.src = ev.target.result; }; reader.readAsDataURL(file);
        });
    };
    handleImage("teamALogo", "teamALogo"); handleImage("teamBLogo", "teamBLogo");
});
</script>
</body>
</html>
