<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BPL Premium Overlay V11</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: transparent; overflow: hidden; font-family: 'Montserrat', sans-serif; }
    .overlay-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    
    /* Bottom Bar */
    .bottom-scorebar { position:absolute; bottom:55px; left:50%; transform:translateX(-50%); width:94%; height:95px; background: linear-gradient(180deg, rgba(2, 6, 15, 0.95), rgba(4, 15, 36, 0.98)); border-top: 3px solid #00f0ff; border-bottom: 2px solid rgba(0, 240, 255, 0.2); display:flex; align-items:center; box-shadow: 0 -10px 40px rgba(0,0,0,0.9), 0 0 20px rgba(0, 240, 255, 0.2); clip-path: polygon(1% 0, 99% 0, 100% 100%, 0% 100%); z-index:100;}
    .team-section { width: 230px; display:flex; align-items:center; justify-content:center; gap:15px; padding:0 15px; }
    .team-logo img { width: 70px; height: 70px; object-fit: contain; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.8)); display: none; }
    .team-name { font-size: 22px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 4px 6px rgba(0,0,0,0.8); }
    
    .score-center { width: 240px; text-align: center; background: radial-gradient(circle, rgba(0,240,255,0.1) 0%, transparent 80%); height: 100%; display: flex; flex-direction: column; justify-content: center; border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08); position: relative; overflow: hidden; }
    .score-large { font-family: 'Bebas Neue', cursive; font-size: 68px; color: white; line-height: 0.9; text-shadow: 0 5px 15px rgba(0,0,0,1); transition: 0.3s; }
    .overs-large { font-size: 16px; font-weight: 900; color: #00f0ff; letter-spacing: 3px; }
    
    .batsman-panel, .bowler-panel { width: 280px; padding: 0 25px; }
    .batsman-row { display:flex; justify-content:space-between; align-items: center; padding: 4px 0; }
    .batsman-name { font-size: 16px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap:8px; color: #fff;}
    .batsman-score { font-family: 'Bebas Neue', cursive; font-size: 28px; letter-spacing: 1px; color:#fff;}
    .batsman-score span { font-family: 'Montserrat', sans-serif; font-size: 14px; color: #888; }
    .on-strike { text-shadow: 0 0 12px rgba(255, 255, 255, 0.4); } .on-strike .batsman-score { color: #ffd700; }
    .off-strike { opacity: 0.7; } 
    .striker-icon { color: #ffd700; font-size: 14px; opacity: 0; } .on-strike .striker-icon { opacity: 1; }
    
    .bowler-name { font-size: 18px; font-weight: 900; color: #00f0ff; text-transform: uppercase; }
    .bowler-figures { font-family: 'Bebas Neue', cursive; font-size: 32px; color: white; letter-spacing: 2px; }
    
    .this-over { display:flex; gap:6px; margin-top:5px; }
    .ball { width: 24px; height: 24px; border-radius: 50%; background: #111; color: white; display:flex; align-items:center; justify-content:center; font-size: 13px; font-weight: 900; border: 1px solid #333; }
    .ball.run { background: #0056b3; } .ball.four { background: #00b85c; color:#000; box-shadow: 0 0 8px #00b85c; } .ball.six { background: #9d4edd; box-shadow: 0 0 8px #9d4edd; } .ball.wicket { background: #e60000; color:#fff; box-shadow: 0 0 8px #e60000; } .ball.extra { background: #e67e22; } .ball.lb { background: #8e44ad; color:white; }
    
    .need-panel { width: 140px; text-align: center; background: rgba(0, 240, 255, 0.1); padding: 5px; border-radius: 8px; border: 1px solid #00f0ff; margin: 0 10px; }
    .need-title { font-size: 12px; font-weight: 900; color: #00f0ff; } .need-runs { font-family: 'Bebas Neue', cursive; font-size: 40px; color: white; line-height: 1; }
    
    .ticker-bar { position:absolute; bottom:15px; left:50%; transform:translateX(-50%); width:92%; height:32px; background: #000; border-radius: 4px; border:1px solid #222; overflow:hidden; z-index:100;}
    .ticker-content { white-space: nowrap; font-size: 15px; font-weight: 800; color: #ffd700; line-height: 32px; letter-spacing: 2px; animation: tickerMove 25s linear infinite; }
    @keyframes tickerMove { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

    /* Hollywood Animations */
    #animation-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 9999; display: flex; justify-content: center; align-items: center; }
    .anim-graphic { font-family: 'Bebas Neue', cursive; font-size: 180px; color: white; letter-spacing: 8px; padding: 20px 100px; border-radius: 20px; text-shadow: 0 10px 30px rgba(0,0,0,1); text-transform: uppercase; opacity: 0; }
    
    @keyframes blast { 0% { transform: scale(0.2) rotate(-15deg); opacity: 0; } 20% { transform: scale(1.1) rotate(5deg); opacity: 1; filter: drop-shadow(0 0 50px rgba(255,255,255,0.8)); } 80% { transform: scale(1) rotate(0deg); opacity: 1; } 100% { transform: scale(3) translateY(-100px); opacity: 0; filter: blur(20px); } }
    .anim-4 { background: linear-gradient(135deg, #001f3f, #0074D9); border-bottom: 15px solid #7FDBFF; animation: blast 3.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .anim-6 { background: linear-gradient(135deg, #85144b, #FF4136); border-bottom: 15px solid #FFD700; color: #FFD700; animation: blast 3.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .anim-w { background: #0a0a0a; color: #ff0000; border-bottom: 15px solid #ff0000; animation: blast 3.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    /* Run Out */
    @keyframes glitch { 0% { transform: translate(0); } 10% { transform: translate(-10px, 10px); filter: hue-rotate(90deg); } 20% { transform: translate(10px, -10px); } 30% { transform: scale(1.2); } 100% { transform: scale(1) translateY(-100px); opacity: 0; } }
    .anim-ro { background: #fff; color: #ff0000; border: 10px solid #000; animation: glitch 3.5s forwards; font-size: 200px; box-shadow: inset 0 0 50px #ff0000; }

    /* Hat-Tricks */
    @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.7); transform: scale(1); } 50% { box-shadow: 0 0 100px 50px rgba(255,0,0,0); transform: scale(1.2); } 100% { transform: scale(2); opacity: 0; } }
    .anim-hw { background: #ff0000; color: #fff; border-bottom: 15px solid #000; animation: pulseRed 4s forwards; font-size:120px;}
    @keyframes goldRush { 0% { background-position: 0% 50%; opacity: 0; transform: translateY(100px); } 20% { opacity: 1; transform: translateY(0); } 80% { opacity: 1; background-position: 100% 50%; } 100% { transform: scale(1.5); opacity: 0; } }
    .anim-h4 { background: linear-gradient(270deg, #ff8c00, #ffd700, #ff8c00); background-size: 400% 400%; color: #000; border-bottom: 15px solid #fff; animation: goldRush 4s forwards; font-size:120px;}

    /* Winner Banner */
    #winnerBanner { display: none; position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #0f172a 0%, #020617 100%); border: 4px solid #ffd700; padding: 50px 80px; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 50px rgba(255,215,0,0.1); text-align: center; z-index: 999999; animation: winnerSweep 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; overflow: hidden; }
    #winnerBanner::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, transparent 60%); animation: rotateGlow 10s linear infinite; }
    @keyframes rotateGlow { 100% { transform: rotate(360deg); } }
    @keyframes winnerSweep { 0% { transform: translate(-50%, 100%); opacity: 0; } 100% { transform: translate(-50%, -50%); opacity: 1; } }
    #winnerTitle { position: relative; color: #ffd700; font-size: 40px; letter-spacing: 6px; margin-bottom: 10px; font-family: 'Montserrat', sans-serif; font-weight:900; }
    #winnerDisplayHtml { position: relative; color: white; font-size: 70px; font-family: 'Bebas Neue', cursive; text-shadow: 0 10px 20px rgba(0,0,0,0.8); }
</style>
</head>
<body>
<div class="overlay-container">
    <div id="animation-container"></div>
    <div id="winnerBanner"><div id="winnerTitle">MATCH CHAMPION</div><div id="winnerDisplayHtml">TEAM WON</div></div>
    
    <div class="bottom-scorebar">
        <div class="team-section left">
            <div class="team-logo"><img id="team1Logo" src=""></div>
            <div class="team-name" id="team1Name">TEAM A</div>
        </div>
        <div class="score-center"><div id="scoreLarge" class="score-large">0-0</div><div id="oversLarge" class="overs-large">0.0 OVERS</div></div>
        <div class="batsman-panel">
            <div class="batsman-row" id="rowB1"><div class="batsman-name"><span class="striker-icon">▶</span> <span id="b1NameDisplay">BAT 1</span></div><div class="batsman-score" id="b1ScoreDisplay">0 <span>(0)</span></div></div>
            <div class="batsman-row" id="rowB2"><div class="batsman-name"><span class="striker-icon">▶</span> <span id="b2NameDisplay">BAT 2</span></div><div class="batsman-score" id="b2ScoreDisplay">0 <span>(0)</span></div></div>
        </div>
        <div class="need-panel" id="targetBox" style="display:none;"><div class="need-title">TARGET</div><div id="needRuns" class="need-runs">0</div></div>
        <div class="bowler-panel"><div class="bowler-name" id="bowlerName">BOWLER</div><div class="bowler-figures" id="bowlerFigures">0-0</div><div class="this-over" id="thisOverBalls"></div></div>
        <div class="team-section right">
            <div class="team-name" id="team2Name">TEAM B</div>
            <div class="team-logo"><img id="team2Logo" src=""></div>
        </div>
    </div>
    <div class="ticker-bar"><div class="ticker-content">🏆 BHIKHANPUR PREMIUM LEAGUE LIVE 🏆 | POWERED BY DIGITAL PROMOTION | CALL: 8252001148 | SUBSCRIBE NOW!</div></div>
</div>

<script>
let lastFlashId = 0; 
const DB_KEY = "BPL_FINAL_BEAST_V11"; // MATCHES ADMIN

function fireAnimation(type) {
    const container = document.getElementById("animation-container"); 
    container.innerHTML = ""; 
    const box = document.createElement("div");
    
    if(type === 4 || type === "4") { box.className = "anim-graphic anim-4"; box.innerText = "FOUR"; }
    else if(type === 6 || type === "6") { box.className = "anim-graphic anim-6"; box.innerText = "SIX"; }
    else if(type === "W") { box.className = "anim-graphic anim-w"; box.innerText = "WICKET"; }
    else if(type === "RO") { box.className = "anim-graphic anim-ro"; box.innerText = "RUN OUT"; }
    else if(type === "HATRICK_W") { box.className = "anim-graphic anim-hw"; box.innerText = "HAT-TRICK WICKET!"; }
    else if(type === "HATRICK_4") { box.className = "anim-graphic anim-h4"; box.innerText = "HAT-TRICK FOURS!"; }
    
    if(box.className) {
        container.appendChild(box); 
        setTimeout(() => { if(container.contains(box)) box.remove(); }, 4000);
    }
}

function setTxt(id, val) { let el = document.getElementById(id); if(el) el.innerText = val || ""; }
function setHtml(id, val) { let el = document.getElementById(id); if(el) el.innerHTML = val || ""; }
function setImg(id, val) { 
    let el = document.getElementById(id); 
    if(el) { if(!val || val.length < 50) el.style.display = "none"; else { el.style.display = "block"; el.src = val; } }
}

function loadData() {
    let data; try { let saved = localStorage.getItem(DB_KEY); if(!saved) return; data = JSON.parse(saved); } catch(e) { return; } if(!data) return; 
    
    let wBanner = document.getElementById("winnerBanner");
    if(wBanner) { wBanner.style.display = data.showWinner ? "block" : "none"; setTxt("winnerDisplayHtml", data.winnerText); }
    
    if (data.flashId && data.flashId !== lastFlashId) { fireAnimation(data.flashEvent); lastFlashId = data.flashId; }
    
    setTxt("scoreLarge", data.score + "-" + data.wickets);
    setTxt("oversLarge", Math.floor(data.balls/6) + "." + (data.balls%6) + " OVERS");
    setTxt("team1Name", data.teamA); setTxt("team2Name", data.teamB);
    setImg("team1Logo", data.teamALogo); setImg("team2Logo", data.teamBLogo);
    
    setTxt("b1NameDisplay", data.b1Name); setHtml("b1ScoreDisplay", `${data.b1Runs} <span>(${data.b1Balls})</span>`);
    setTxt("b2NameDisplay", data.b2Name); setHtml("b2ScoreDisplay", `${data.b2Runs} <span>(${data.b2Balls})</span>`);
    document.getElementById("rowB1").className = data.onStrike === 1 ? "batsman-row on-strike" : "batsman-row off-strike";
    document.getElementById("rowB2").className = data.onStrike === 2 ? "batsman-row on-strike" : "batsman-row off-strike";
    
    setTxt("bowlerName", data.bowler); setTxt("bowlerFigures", `${data.bowlerWickets}-${data.bowlerRuns}`);
    const tb = document.getElementById("targetBox");
    if(tb) { tb.style.display = (data.innings === 2 && data.target > 0) ? "block" : "none"; setTxt("needRuns", data.target); }
    
    let tob = document.getElementById("thisOverBalls");
    if(tob) {
        let html = ""; (data.thisOver || []).forEach(ball => {
            let cls = "ball"; 
            if(ball === 4 || ball === "4") cls += " four"; 
            else if(ball === 6 || ball === "6") cls += " six"; 
            else if(ball === "W" || ball === "RO") cls += " wicket"; 
            else if(String(ball).includes("LB")) cls += " lb";
            else if(["WD","NB","4LB","5B"].includes(ball)) cls += " extra"; 
            else cls += " run";
            html += `<span class="${cls}">${ball}</span>`;
        }); setHtml("thisOverBalls", html);
    }
}

// BULLETPROOF SYNC: Machine Gun Polling every 200ms
window.addEventListener('storage', loadData); 
setInterval(loadData, 200); 
loadData();
</script>
</body>
</html>
